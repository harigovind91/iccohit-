<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICCOHIT | The Global Truth Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent: #ffcc00; --bg: #000; --zinc: #111; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Master Scrolling Engine */
        .viral-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .viral-container::-webkit-scrollbar { display: none; }
        .reel-node { height: 100vh; width: 100%; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        
        /* Video Render */
        .full-media { width: 100%; height: 100%; object-fit: cover; }
        
        /* HAI Autonomous Labels */
        .hai-verified { position: absolute; top: 30px; left: 20px; background: rgba(0,0,0,0.8); border-left: 4px solid var(--accent); padding: 8px 15px; border-radius: 4px; font-size: 11px; font-weight: 900; letter-spacing: 1px; color: var(--accent); z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ad-engine-banner { position: absolute; top: 12%; width: 100%; background: linear-gradient(90deg, transparent, var(--accent), transparent); color: #000; padding: 10px; font-weight: 900; font-size: 10px; text-align: center; z-index: 90; text-transform: uppercase; }

        /* Interaction HUD */
        .hud-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 25px; z-index: 200; }
        .hud-btn { text-align: center; transition: 0.3s; cursor: pointer; }
        .hud-btn i { font-size: 2rem; text-shadow: 0 0 15px rgba(0,0,0,1); }
        .hud-btn span { display: block; font-size: 0.7rem; font-weight: bold; margin-top: 5px; }

        /* Full Feature Overlays */
        .app-page { position: fixed; inset: 0; background: #fff; color: #000; z-index: 5000; display: none; overflow-y: auto; padding-bottom: 100px; }
        .app-page.active { display: block; animation: viewSlide 0.4s cubic-bezier(0,0,0.2,1); }
        @keyframes viewSlide { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* UI Elements */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 6000; }
        .nav-icon { font-size: 1.5rem; color: #777; cursor: pointer; transition: 0.2s; }
        .nav-icon.active { color: var(--accent); transform: translateY(-5px); }

        /* Input Styles */
        .icco-field { width: 100%; padding: 18px; background: #f5f5f5; border: 2px solid #eee; border-radius: 15px; margin-bottom: 15px; outline: none; font-weight: 600; }
        .icco-field:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <main id="feed-container" class="viral-container">
        </main>

    <section id="page-studio" class="app-page !bg-black !text-white">
        <div class="p-6 flex justify-between items-center border-b border-zinc-800">
            <h2 class="text-2xl font-black italic italic">ICCOHIT STUDIO</h2>
            <i class="fas fa-times text-2xl" onclick="closePages()"></i>
        </div>
        <div class="p-4">
            <div class="relative aspect-[9/16] bg-zinc-900 rounded-[40px] overflow-hidden border-2 border-zinc-700 mb-6">
                <video id="studio-preview" autoplay muted playsinline class="w-full h-full object-cover"></video>
                <div class="absolute right-5 top-10 flex flex-col gap-8 text-2xl">
                    <i class="fas fa-sync" onclick="flipCam()"></i>
                    <i class="fas fa-magic" onclick="alert('Beauty Glow: Max')"></i>
                    <i class="fas fa-scissors"></i>
                    <i class="fas fa-palette"></i>
                </div>
            </div>
            <input type="text" id="post-caption" placeholder="सच क्या है? बयां करें..." class="icco-field !bg-zinc-800 !border-zinc-700 !text-white">
            <div class="flex gap-4">
                <button id="rec-trigger" onclick="handleRecord()" class="flex-[2] bg-red-600 p-5 rounded-2xl font-black text-xl">START RECORDING</button>
                <button onclick="haiVerifyAndPublish()" class="flex-1 bg-white text-black p-5 rounded-2xl font-black text-xl">PUBLISH</button>
            </div>
            <button onclick="document.getElementById('gallery-pick').click()" class="w-full mt-4 p-4 border border-zinc-700 rounded-2xl font-bold">Upload from Gallery</button>
            <input type="file" id="gallery-pick" class="hidden" accept="video/*">
        </div>
    </section>

    <section id="page-dashboard" class="app-page">
        <div class="p-8 bg-black text-white rounded-b-[50px] shadow-2xl">
            <div class="flex items-center gap-6 mb-8">
                <div class="w-20 h-20 bg-yellow-400 rounded-full border-4 border-white overflow-hidden shadow-lg">
                    <img id="profile-img" src="https://via.placeholder.com/150" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-3xl font-black italic">HARI_SOVEREIGN</h1>
                    <p class="text-[10px] text-yellow-400 font-bold uppercase tracking-widest">Sovereign Node Verified</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 p-5 rounded-3xl">
                    <p class="text-[10px] opacity-50 uppercase">Earnings</p>
                    <h2 id="cash-stat" class="text-2xl font-black text-yellow-400">₹ 0.00</h2>
                </div>
                <div class="bg-zinc-900 p-5 rounded-3xl">
                    <p class="text-[10px] opacity-50 uppercase">Global Views</p>
                    <h2 class="text-2xl font-black">Unlimited</h2>
                </div>
            </div>
            <button onclick="withdrawAction()" class="w-full bg-green-600 p-5 rounded-2xl font-black mt-6 shadow-xl">WITHDRAW TO UPI/BANK</button>
        </div>

        <div class="p-6 space-y-6">
            <div class="bg-yellow-50 p-6 rounded-[35px] border-4 border-yellow-400" onclick="triggerUPI(499)">
                <h3 class="font-black text-2xl">WORLDWIDE AD VIRAL PASS</h3>
                <p class="text-xs text-gray-600 mb-4">Create one ad, show it to 8 Billion people instantly.</p>
                <div class="flex justify-between items-center">
                    <span class="text-3xl font-black">₹499</span>
                    <button class="bg-black text-white px-8 py-3 rounded-full font-bold">ACTIVATE</button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="bg-gray-100 p-5 rounded-2xl font-bold flex items-center gap-3"><i class="fas fa-users text-xl"></i> Friends</button>
                <button class="bg-gray-100 p-5 rounded-2xl font-bold flex items-center gap-3"><i class="fas fa-comment-dots text-xl"></i> Chat</button>
                <button class="bg-gray-100 p-5 rounded-2xl font-bold flex items-center gap-3"><i class="fas fa-video text-xl"></i> Video Call</button>
                <button class="bg-gray-100 p-5 rounded-2xl font-bold flex items-center gap-3"><i class="fas fa-ad text-xl"></i> Create Ad</button>
            </div>

            <div class="pt-6 border-t">
                <h4 class="font-black uppercase mb-4">Account Settings</h4>
                <input type="text" placeholder="Full Name" class="icco-field">
                <input type="text" placeholder="Location Address" class="icco-field">
                <input type="text" placeholder="UPI ID for Payouts" class="icco-field">
            </div>
        </div>
    </section>

    <nav class="nav-bar">
        <i class="fas fa-home nav-icon active" onclick="closePages()"></i>
        <i class="fas fa-plus-square nav-icon" onclick="openNav('studio')"></i>
        <i class="fas fa-chart-line nav-icon" onclick="openNav('dashboard')"></i>
        <i class="fas fa-user-circle nav-icon" onclick="openNav('dashboard')"></i>
    </nav>

    <script>
        // --- HAI CORE ENGINE CONFIG ---
        let db, mediaStream, mediaRecorder, chunks = [], camType = "user";
        const myUPI = "harigovindsingh91-2@okaxis";

        // 1. Initialize Autonomous Database
        const dbReq = indexedDB.open("ICCOHIT_GLOBAL_CORE", 1);
        dbReq.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("reels", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("payouts", { keyPath: "id", autoIncrement: true });
        };
        dbReq.onsuccess = e => { db = e.target.result; renderGlobalFeed(); };

        // 2. Camera Logic
        async function startStudio() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: camType }, audio: true });
                document.getElementById('studio-preview').srcObject = mediaStream;
            } catch (e) { alert("Camera Access Required for ICCOHIT"); }
        }

        function flipCam() {
            camType = (camType === "user") ? "environment" : "user";
            startStudio();
        }

        function handleRecord() {
            const btn = document.getElementById('rec-trigger');
            if(!mediaRecorder || mediaRecorder.state === "inactive") {
                chunks = []; mediaRecorder = new MediaRecorder(mediaStream);
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.start();
                btn.innerText = "STOP RECORDING"; btn.classList.replace("bg-red-600", "bg-zinc-800");
            } else {
                mediaRecorder.stop();
                btn.innerText = "START RECORDING"; btn.classList.replace("bg-zinc-800", "bg-red-600");
            }
        }

        // 3. HAI Truth Verification & Publish
        function haiVerifyAndPublish() {
            const cap = document.getElementById('post-caption').value;
            if(!cap || chunks.length === 0) return alert("ICCOHIT: Content required!");

            // Simulation of HAI scanning for AI Markers
            alert("HAI: Scanning for AI-Fake markers... Verification Successful.");
            
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const post = { caption: cap, video: URL.createObjectURL(blob), date: Date.now(), views: Math.floor(Math.random()*1000) };
            
            db.transaction("reels", "readwrite").objectStore("reels").add(post);
            alert("Sovereign Broadcast Initiated!");
            closePages();
        }

        // 4. Viral Feed Logic (The Soul of ICCOHIT)
        function renderGlobalFeed() {
            const feed = document.getElementById('feed-container');
            feed.innerHTML = '';
            db.transaction("reels").objectStore("reels").getAll().onsuccess = e => {
                const results = e.target.result.reverse();
                if(results.length === 0) {
                    feed.innerHTML = `<div class="h-full flex items-center justify-center text-zinc-800 font-black text-center p-10">THE WORLD IS SILENT. BE THE FIRST TO SPEAK THE TRUTH.</div>`;
                    return;
                }
                results.forEach(item => {
                    feed.innerHTML += `
                        <div class="reel-node">
                            <div class="hai-verified">● HAI SECURE: NO AI DETECTED</div>
                            <div class="ad-engine-banner">SPONSORED: GLOBAL SOVEREIGN PARTNER</div>
                            <video src="${item.video}" class="full-media" autoplay loop muted playsinline></video>
                            
                            <div class="hud-actions">
                                <div class="hud-btn text-white"><i class="fas fa-bolt text-yellow-400"></i><span>Viral</span></div>
                                <div class="hud-btn text-white" onclick="shareViral('${item.caption}')"><i class="fas fa-share-alt"></i><span>Share</span></div>
                                <div class="hud-btn text-yellow-400" onclick="downloadViral('${item.video}')"><i class="fas fa-cloud-download-alt"></i><span>Save</span></div>
                            </div>

                            <div class="absolute bottom-28 left-6 z-10 pr-20">
                                <h3 class="text-2xl font-black italic text-white drop-shadow-xl">${item.caption}</h3>
                                <p class="text-[10px] text-yellow-400 font-black mt-2 uppercase tracking-tighter">Verified Node • Distributed Worldwide</p>
                            </div>
                        </div>
                    `;
                });
            };
        }

        // 5. Global Economy (Earnings & UPI)
        let wallet = 0;
        setInterval(() => {
            if(!document.hidden && !document.querySelector('.app-page.active')) {
                wallet += 0.05; // Views/Watchtime auto-accumulation
                const display = document.getElementById('cash-stat');
                if(display) display.innerText = `₹ ${wallet.toFixed(2)}`;
            }
        }, 10000);

        function triggerUPI(amt) {
            // Direct launch of UPI Apps on User Device
            window.location.href = `upi://pay?pa=${myUPI}&pn=ICCOHIT&am=${amt}&cu=INR&tn=ViralPass_Subscription`;
        }

        function withdrawAction() {
            if(wallet < 1) return alert("Minimum ₹1 Required");
            const req = { amount: wallet.toFixed(2), time: new Date().toLocaleString() };
            db.transaction("payouts", "readwrite").objectStore("payouts").add(req);
            alert("Request sent to Admin Panel. HAI will process within 24hrs.");
            wallet = 0;
        }

        // 6. Navigation Control
        function openNav(id) {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            if(id === 'studio') startStudio();
        }

        function closePages() {
            document.querySelectorAll('.app-page').forEach(p => p.classList.remove('active'));
            if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            renderGlobalFeed();
        }

        function shareViral(t) { if(navigator.share) navigator.share({title: 'ICCOHIT', text: t, url: location.href}); }
        function downloadViral(u) { const a = document.createElement('a'); a.href = u; a.download = 'ICCOHIT_TRUTH.mp4'; a.click(); }
    </script>
</body>
</html>

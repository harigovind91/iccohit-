<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICCOHIT | Admin Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Home Page White Theme */
        body { background: #ffffff; color: #000; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        
        .main-display { height: 75vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        /* Modern Footer Dock - All Buttons Here */
        .sovereign-footer { 
            height: 25vh; 
            background: #f8f9fa; 
            border-top: 1px solid #eee; 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100;
        }

        .dock-icons { display: flex; align-items: center; justify-content: space-around; width: 100%; max-width: 500px; padding-bottom: 20px; }
        
        .icon-btn { cursor: pointer; text-align: center; color: #666; transition: 0.3s; flex: 1; }
        .icon-btn i { font-size: 22px; }
        .icon-btn p { font-size: 9px; font-weight: 800; margin-top: 5px; text-transform: uppercase; }
        .icon-btn:hover, .active-tab { color: #000; opacity: 1; }

        /* The Power Plus Button */
        .central-plus { 
            width: 60px; height: 60px; background: #000; color: #fff; 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; font-size: 24px; transform: translateY(-25px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
        }

        /* Creative Studio Overlay */
        #studio-overlay { 
            display: none; position: fixed; inset: 0; background: #fff; 
            z-index: 500; flex-direction: column; padding: 20px; 
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .studio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 40px; }
        .studio-item { background: #f0f0f0; padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; }
        .studio-item:hover { background: #000; color: #fff; }

        /* AI Boot Glow */
        .ai-glow { color: #007bff; text-shadow: 0 0 10px rgba(0,123,255,0.2); }
    </style>
</head>
<body>

    <main class="main-display">
        <div id="home-content" class="text-center">
            <h1 class="text-6xl font-black italic tracking-tighter text-zinc-200">ICCOHIT</h1>
            <p class="text-zinc-400 text-[10px] tracking-[1em] mt-2 uppercase">Official Environment</p>
        </div>
    </main>

    <div id="studio-overlay">
        <div class="flex justify-between items-center">
            <h2 class="font-black text-xl italic">STUDIO ENGINE</h2>
            <button onclick="toggleStudio()" class="text-3xl">&times;</button>
        </div>
        
        <div class="studio-grid">
            <div class="studio-item" onclick="act('VIDEO UPLOAD')"><i class="fas fa-video"></i><p class="text-[8px] mt-2 font-bold">VIDEO</p></div>
            <div class="studio-item" onclick="act('REEL CREATE')"><i class="fas fa-film"></i><p class="text-[8px] mt-2 font-bold">REEL</p></div>
            <div class="studio-item" onclick="act('GALLERY')"><i class="fas fa-images"></i><p class="text-[8px] mt-2 font-bold">GALLERY</p></div>
            <div class="studio-item" onclick="act('FRONT CAM')"><i class="fas fa-camera"></i><p class="text-[8px] mt-2 font-bold">FRONT</p></div>
            <div class="studio-item" onclick="act('BACK CAM')"><i class="fas fa-camera-retro"></i><p class="text-[8px] mt-2 font-bold">BACK</p></div>
            <div class="studio-item" onclick="act('EDIT POST')"><i class="fas fa-edit"></i><p class="text-[8px] mt-2 font-bold">EDIT</p></div>
            <div class="studio-item" onclick="act('PUBLISH')"><i class="fas fa-cloud-upload-alt"></i><p class="text-[8px] mt-2 font-bold">PUBLISH</p></div>
            <div class="studio-item" onclick="act('LIVE')"><i class="fas fa-broadcast-tower"></i><p class="text-[8px] mt-2 font-bold">LIVE</p></div>
            <div class="studio-item" onclick="act('SHARE')"><i class="fas fa-share-alt"></i><p class="text-[8px] mt-2 font-bold">SHARE</p></div>
        </div>
    </div>

    <footer class="sovereign-footer">
        <div class="dock-icons">
            <div class="icon-btn active-tab" onclick="location.reload()">
                <i class="fas fa-house"></i><p>Home</p>
            </div>
            
            <div class="icon-btn ai-glow" onclick="act('AI BOOTING...')">
                <i class="fas fa-robot"></i><p>AI Boot</p>
            </div>

            <div class="central-plus" onclick="toggleStudio()">
                <i class="fas fa-plus"></i>
            </div>

            <div class="icon-btn" onclick="act('OPEN PROFILE')">
                <i class="fas fa-user-circle"></i><p>Profile</p>
            </div>

            <div class="icon-btn" onclick="act('OPEN MENU')">
                <i class="fas fa-bars-staggered"></i><p>Menu</p>
            </div>
        </div>

        <div class="text-[8px] text-zinc-300 font-bold tracking-widest uppercase mb-4">
            ICCOHIT ENGINE v2.0 | Lucknow Section | Private Protocol
        </div>
    </footer>

    <script>
        function toggleStudio() {
            const studio = document.getElementById('studio-overlay');
            studio.style.display = (studio.style.display === 'flex') ? 'none' : 'flex';
        }

        function act(msg) {
            console.log("System Executing: " + msg);
            alert("ICCOHIT Interface: " + msg + " सक्रिय हो रहा है।");
        }
    </script>
</body>
</html>

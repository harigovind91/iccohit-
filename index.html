<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ICCOHIT | Sovereign Elite Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Camera UI Enhancements */
        .camera-container { position: relative; width: 100%; height: 100vh; background: #000; overflow: hidden; }
        #video-feed { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay UI */
        .side-tools { position: absolute; right: 15px; top: 20%; display: flex; flex-direction: column; gap: 25px; z-index: 50; }
        .tool-btn { display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .tool-btn i { font-size: 24px; margin-bottom: 5px; }

        .bottom-tools { position: absolute; bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 50; }
        .record-trigger { width: 75px; height: 75px; border: 5px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .record-inner { width: 60px; height: 60px; background: #ff0050; border-radius: 50%; transition: 0.3s; }
        .recording .record-inner { border-radius: 10px; transform: scale(0.6); }

        /* Music & Filter Modals */
        .glass-panel { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border-radius: 20px 20px 0 0; position: fixed; bottom: 0; width: 100%; height: 60%; transform: translateY(100%); transition: 0.4s ease; z-index: 1000; padding: 20px; }
        .panel-active { transform: translateY(0); }

        /* Filter Preview */
        .filter-glow { filter: brightness(1.2) contrast(1.1) saturate(1.2); }
        .filter-sepia { filter: sepia(0.5) contrast(1.2); }
        
        .footer-nav { height: 60px; background: #000; border-top: 0.5px solid #333; position: fixed; bottom: 0; width: 100%; display: flex; align-items: center; justify-content: space-around; z-index: 100; }
    </style>
</head>
<body>

    <main id="home-feed" class="h-screen w-screen bg-zinc-900 flex items-center justify-center">
        <p class="text-zinc-500 font-bold italic">ICCOHIT GLOBAL FEED LOADING...</p>
    </main>

    <div id="studio-engine" class="fixed inset-0 z-[200] hidden">
        <div class="camera-container">
            <video id="video-feed" autoplay playsinline></video>
            
            <div class="side-tools">
                <div class="tool-btn" onclick="switchCamera()"><i class="fas fa-sync-alt"></i>FLIP</div>
                <div class="tool-btn" onclick="togglePanel('music-panel')"><i class="fas fa-music text-yellow-400"></i>MUSIC</div>
                <div class="tool-btn" onclick="applyGlow()"><i class="fas fa-magic text-blue-400"></i>GLOW</div>
                <div class="tool-btn" onclick="togglePanel('makeup-panel')"><i class="fas fa-sparkles text-pink-400"></i>BEAUTY</div>
            </div>

            <div class="absolute top-10 w-full flex justify-center">
                <div id="selected-music" class="bg-black/40 px-4 py-2 rounded-full text-xs font-bold border border-white/20 hidden">
                    <i class="fas fa-music mr-2"></i> <span id="track-name">No Music Selected</span>
                </div>
            </div>

            <div class="bottom-tools">
                <div class="flex items-center gap-12 mb-8">
                    <div class="tool-btn" onclick="openGallery()"><i class="fas fa-images text-2xl"></i>ALBUM</div>
                    <div id="record-btn" onclick="handleRecording()" class="record-trigger">
                        <div class="record-inner"></div>
                    </div>
                    <div id="next-btn" class="tool-btn hidden" onclick="openEditor()"><i class="fas fa-arrow-circle-right text-3xl text-green-500"></i>NEXT</div>
                </div>
            </div>
            
            <button onclick="closeStudio()" class="absolute top-10 left-5 text-2xl"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div id="music-panel" class="glass-panel">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-black italic">SEARCH MUSIC</h3>
            <i class="fas fa-chevron-down" onclick="togglePanel('music-panel')"></i>
        </div>
        <input type="text" placeholder="Search Viral Songs..." class="w-full bg-zinc-800 p-3 rounded-xl border-none outline-none mb-4">
        <div class="space-y-3 overflow-y-auto h-full">
            <div class="flex justify-between p-3 bg-zinc-800/50 rounded-lg" onclick="selectTrack('Sovereign Beats')"><span>Sovereign Beats</span> <i class="fas fa-plus"></i></div>
            <div class="flex justify-between p-3 bg-zinc-800/50 rounded-lg" onclick="selectTrack('Digital India Mashup')"><span>Digital India Mashup</span> <i class="fas fa-plus"></i></div>
            <div class="flex justify-between p-3 bg-zinc-800/50 rounded-lg" onclick="selectTrack('Aciwho Theme')"><span>Aciwho Theme</span> <i class="fas fa-plus"></i></div>
        </div>
    </div>

    <div id="makeup-panel" class="glass-panel h-[40%]">
        <h3 class="font-black italic mb-6">BEAUTY & FILTERS</h3>
        <div class="grid grid-cols-4 gap-4">
            <div class="text-center" onclick="setFilter('none')"><div class="w-12 h-12 rounded-full bg-zinc-700 mx-auto mb-1"></div>Normal</div>
            <div class="text-center" onclick="setFilter('glow')"><div class="w-12 h-12 rounded-full bg-blue-500 mx-auto mb-1"></div>Glow</div>
            <div class="text-center" onclick="setFilter('sepia')"><div class="w-12 h-12 rounded-full bg-orange-800 mx-auto mb-1"></div>Film</div>
            <div class="text-center" onclick="setFilter('makeup')"><div class="w-12 h-12 rounded-full bg-pink-500 mx-auto mb-1"></div>Smooth</div>
        </div>
    </div>

    <footer class="footer-nav">
        <i class="fas fa-home text-white" onclick="location.reload()"></i>
        <i class="fas fa-search text-zinc-500"></i>
        <div class="w-12 h-10 bg-white text-black flex items-center justify-center rounded-xl" onclick="openStudio()">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-comment text-zinc-500"></i>
        <i class="fas fa-user text-zinc-500"></i>
    </footer>

    <script>
        let stream;
        let isRecording = false;
        let currentFacing = 'user';

        async function openStudio() {
            document.getElementById('studio-engine').classList.remove('hidden');
            startCamera();
        }

        async function startCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacing, width: 1080, height: 1920 }, 
                    audio: true 
                });
                document.getElementById('video-feed').srcObject = stream;
            } catch (err) {
                alert("Camera access denied!");
            }
        }

        function switchCamera() {
            currentFacing = (currentFacing === 'user') ? 'environment' : 'user';
            startCamera();
        }

        function handleRecording() {
            const btn = document.getElementById('record-btn');
            const nextBtn = document.getElementById('next-btn');
            isRecording = !isRecording;

            if (isRecording) {
                btn.classList.add('recording');
                nextBtn.classList.add('hidden');
                console.log("Recording started...");
            } else {
                btn.classList.remove('recording');
                nextBtn.classList.remove('hidden');
                alert("वीडियो सुरक्षित कर लिया गया है!");
            }
        }

        function togglePanel(id) {
            document.getElementById(id).classList.toggle('panel-active');
        }

        function selectTrack(name) {
            document.getElementById('selected-music').classList.remove('hidden');
            document.getElementById('track-name').innerText = name;
            togglePanel('music-panel');
        }

        function setFilter(type) {
            const video = document.getElementById('video-feed');
            video.className = ""; // Reset
            if (type === 'glow') video.classList.add('filter-glow');
            if (type === 'sepia') video.classList.add('filter-sepia');
            if (type === 'makeup') video.style.filter = "saturate(1.3) blur(0.2px) brightness(1.1)";
        }

        function applyGlow() {
            const video = document.getElementById('video-feed');
            video.style.filter = video.style.filter ? "" : "brightness(1.3) contrast(1.1)";
        }

        function openGallery() {
            alert("Album: अपने फ़ोन की गैलरी से वीडियो चुनें।");
        }

        function openEditor() {
            alert("Editing Mode: यहाँ आप टेक्स्ट जोड़ सकते हैं और पब्लिश कर सकते हैं।");
            // यहाँ पब्लिशिंग लॉजिक जोड़ें
        }

        function closeStudio() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            document.getElementById('studio-engine').classList.add('hidden');
        }
    </script>
</body>
</html>
